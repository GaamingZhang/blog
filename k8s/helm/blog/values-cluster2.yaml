image:
  repository: 192.168.31.31:30002/gaaming/blog
  tag: latest

imagePullSecrets:
  - name: harbor-registry-secret

cluster: cluster2

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/canary: "false"
    nginx.ingress.kubernetes.io/load-balance: round_robin
  hosts:
    - host: local.blog
      paths:
        - path: /
          pathType: Prefix
