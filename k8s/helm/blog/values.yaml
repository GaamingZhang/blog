replicaCount: 2

image:
  repository: gaaming/blog
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
namespace: blog

service:
  type: ClusterIP
  port: 80
  targetPort: http

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/canary: "false"
    nginx.ingress.kubernetes.io/load-balance: round_robin
  hosts:
    - host: local.blog
      paths:
        - path: /
          pathType: Prefix

canary:
  enabled: false
  weight: 0
  header:
    enabled: false
    name: ""
    value: ""

cluster: ""
